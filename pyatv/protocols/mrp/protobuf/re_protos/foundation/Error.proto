syntax = "proto2";

import "foundation/Dictionary.proto";

message Error {
  optional string domain = 1;
  optional int32 code = 2;
  optional string localizedDescription = 3;
  optional string localizedFailureReason = 4;
  repeated Error underlyingErrors = 5;
  optional string debugMessage = 6;
  optional Dictionary userInfo = 100;
}

enum ErrorCodes {
    NoError = 0;                                     // "No Error"
    UnknownError = 1;                                // "Unknown Error"
    InvalidOperation = 2;                            // "Invalid Operation"
    OperationNotPermitted = 3;                       // "Operation not permitted"

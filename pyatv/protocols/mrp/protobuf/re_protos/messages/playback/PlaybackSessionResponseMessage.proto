syntax = "proto2";

import "protocol/ProtocolMessage.proto";
import "types/playback/PlaybackSession.proto";
import "types/playback/PlaybackSessionMigrateRequest.proto";

extend ProtocolMessage {
  optional PlaybackSessionResponseMessage playbackSessionResponseMessage = 74;
}

message PlaybackSessionResponseMessage {
   optional PlaybackSession playbackSession = 1;
   optional PlaybackSessionMigrateRequest request = 2;
}

syntax = "proto2";

import "protocol/ProtocolMessage.proto";

extend ProtocolMessage {
  optional VolumeControlAvailabilityMessage volumeControlAvailabilityMessage = 22;
}


message VolumeControlAvailabilityMessage {
  optional bool volumeControlAvailable = 1;

  // Bitmask of volume control capabilities.
  //
  // This field is encoded by Apple as int32 (varint on the wire).
  // Multiple bits may be set simultaneously.
  //
  // Bit layout:
  //   0x0 (0)  = None
  //   0x1 (1)  = Mute
  //   0x2 (2)  = Relative        (increment/decrement style)
  //   0x4 (4)  = Absolute        (direct volume set)
  //   0x8 (8)  = Adjustment      (route/device-level adjustment)
  //
  // Example values:
  //   0   -> None
  //   2   -> Relative
  //   5   -> Mute | Absolute
  //   15  -> All capabilities
  //
  optional int32 volumeCapabilities = 2;
}

syntax = "proto2";
import "types/playback/PlayerPath.proto";
import "protocol/ProtocolMessage.proto";
extend ProtocolMessage {
  optional InvalidateApplicationConnectionMessage invalidateApplicationConnectionMessage = 107;
}

// Same as ApplicationConnectionContext
message InvalidateApplicationConnectionMessage {
  optional string identifier = 1;
  optional string service_name = 2;
  optional PlayerPath destination_player_path = 3;
}

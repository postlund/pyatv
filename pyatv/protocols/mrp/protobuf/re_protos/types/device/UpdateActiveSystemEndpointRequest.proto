syntax = "proto2";
import "foundation/Common.proto";

message UpdateActiveSystemEndpointRequest {
  optional string outputDeviceUid = 1;
  optional ChangeType.Enum changeType = 2;
  optional string reason = 3;
  optional bool pairedDeviceSync = 4;
  optional uint64 type = 5;
  optional double disableDuration = 6;
  optional bool demoteWhenSyncingToCompanion = 7;
  optional string previousOutputDeviceUid = 8;
}

syntax = "proto2";


message RequestDetails {
  optional string initiator = 1;
  optional string requestID = 2;
  optional string reason = 3;

  optional uint32 qos = 4;
  optional uint64 startDate = 5;

  optional bool userInitiated = 6;
  optional bool initiatorWasInferred = 7;

  optional string originatingBundleID = 8;
  optional string operationID = 9;
  optional string surface = 10;
}
